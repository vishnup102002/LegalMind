<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegalMind — AI Legal Assistant</title>
    <!-- Modern Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c16;
            --sidebar-bg: rgba(13, 15, 30, 0.7);
            --card-bg: rgba(18, 20, 38, 0.45);
            --card-border: rgba(255, 255, 255, 0.07);
            --accent-primary: #6366f1; /* Indigo */
            --accent-secondary: #a855f7; /* Purple */
            --accent-success: #10b981; /* Emerald */
            --accent-error: #ef4444; /* Rose */
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --user-bubble-bg: rgba(99, 102, 241, 0.25);
            --user-bubble-border: rgba(99, 102, 241, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.08) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Layout Grid */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sidebar Styling (Chat History) */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .logo-glow {
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 50%;
            box-shadow: 0 0 10px 2px var(--accent-primary);
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 20px;
            background: linear-gradient(to right, #fff, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .new-chat-container {
            padding: 16px 20px;
        }

        .new-chat-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            color: #fff;
            padding: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .new-chat-btn:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--accent-primary);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.15);
        }

        .history-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 12px 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13.5px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            group: hover;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.02);
            color: #fff;
        }

        .history-item.active {
            background: rgba(99, 102, 241, 0.08);
            color: #fff;
            border-left: 2.5px solid var(--accent-primary);
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        .history-title-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 190px;
        }

        .delete-history-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, color 0.2s;
            padding: 2px 6px;
        }

        .history-item:hover .delete-history-btn {
            opacity: 1;
        }

        .delete-history-btn:hover {
            color: var(--accent-error);
        }

        /* Sidebar Health Indicators */
        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pill .indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #555;
        }

        .status-pill.connected .indicator {
            background-color: var(--accent-success);
            box-shadow: 0 0 6px 1px var(--accent-success);
        }

        .status-pill.disconnected .indicator {
            background-color: var(--accent-error);
            box-shadow: 0 0 6px 1px var(--accent-error);
        }

        /* Chat Workspace Panel */
        .chat-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            background: transparent;
        }

        /* Chat Threads Container */
        .chat-scroller {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* Empty Landing State */
        .landing-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            text-align: center;
            padding: 40px;
            animation: fadeIn 0.4s ease-out;
        }

        .landing-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 36px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .landing-subtitle {
            font-size: 15px;
            color: var(--text-muted);
            max-width: 500px;
            line-height: 1.6;
        }

        /* Chat Message Bubbles */
        .message-row {
            display: flex;
            width: 100%;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.assistant {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 14.5px;
            line-height: 1.6;
        }

        .message-row.user .message-bubble {
            background: var(--user-bubble-bg);
            border: 1px solid var(--user-bubble-border);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.1);
        }

        .message-row.assistant .message-bubble {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 780px;
        }

        /* RAG Safety Metrics inside card */
        .rag-metrics {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .faithfulness-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .meter-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            min-width: 100px;
        }

        .meter-bar-outer {
            flex-grow: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .meter-bar-inner {
            height: 100%;
            background: linear-gradient(to right, var(--accent-secondary), var(--accent-success));
            width: 0%;
        }

        .meter-val {
            font-size: 11.5px;
            font-weight: 700;
            color: var(--text-muted);
            min-width: 40px;
            text-align: right;
        }

        .shield-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            align-self: flex-start;
        }

        .shield-badge.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-success);
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        .shield-badge.warning {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-error);
            border: 1px solid rgba(239, 68, 68, 0.15);
        }

        /* Mapping Detail Collapsible */
        .analysis-dropdown {
            margin-top: 10px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            background: rgba(255, 255, 255, 0.01);
        }

        .analysis-header {
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .analysis-body {
            padding: 12px;
            font-size: 12.5px;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            display: none;
            line-height: 1.5;
        }

        /* IRAC Element layouts */
        .irac-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 14px;
        }

        .irac-element {
            display: flex;
            gap: 14px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 10px;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .irac-letter {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.15);
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
            font-family: 'Outfit', sans-serif;
        }

        .irac-element.rule .irac-letter {
            background: rgba(168, 85, 247, 0.08);
            border-color: rgba(168, 85, 247, 0.15);
            color: var(--accent-secondary);
        }

        .irac-element.app .irac-letter {
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.15);
            color: var(--accent-success);
        }

        .irac-element.conclusion .irac-letter {
            background: rgba(245, 158, 11, 0.08);
            border-color: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .irac-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .irac-title {
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #fff;
        }

        .irac-content {
            font-size: 13.5px;
            line-height: 1.5;
            color: var(--text-main);
        }

        .unverified-warning {
            font-size: 13.5px;
            line-height: 1.6;
            color: #fda4af;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            padding: 16px;
            border-radius: 10px;
            margin-top: 14px;
        }

        /* Bottom Input Section */
        .input-container {
            padding: 20px 60px 32px 60px;
            background: linear-gradient(to top, var(--bg-color) 70%, transparent);
            position: sticky;
            bottom: 0;
            z-index: 10;
        }

        .input-bar {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 6px 12px 6px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: border-color 0.2s;
        }

        .input-bar:focus-within {
            border-color: var(--accent-primary);
        }

        .chat-input {
            flex-grow: 1;
            background: none;
            border: none;
            color: var(--text-main);
            outline: none;
            font-size: 14.5px;
            padding: 12px 0;
            resize: none;
            height: 44px;
            line-height: 20px;
        }

        .send-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
            transition: transform 0.2s, opacity 0.2s;
        }

        .send-btn:hover {
            opacity: 0.95;
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: rgba(255, 255, 255, 0.05);
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.5;
        }

        .mic-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 6px;
            transition: color 0.2s, background 0.2s;
        }

        .mic-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .mic-btn.recording {
            color: var(--accent-error) !important;
            background: rgba(239, 68, 68, 0.1) !important;
            animation: pulse 1.5s infinite;
        }

        .voice-toggle-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 6px;
            transition: all 0.2s;
        }

        .voice-toggle-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .voice-toggle-btn.active {
            color: var(--accent-success) !important;
            background: rgba(16, 185, 129, 0.1) !important;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.15);
        }

        .lang-toggle-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 6px;
            font-size: 11px;
            font-weight: 700;
            transition: all 0.2s;
        }

        .lang-toggle-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-primary);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Loading Indicator bubble */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.3s linear infinite;
        }

        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        /* Animation keyframes */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar: Chat History -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo-glow"></div>
                <div class="logo-text">LegalMind</div>
            </div>
            
            <div class="new-chat-container">
                <button class="new-chat-btn" onclick="startNewChat()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New Chat
                </button>
            </div>

            <div id="history-list" class="history-list">
                <!-- Chat history items will load here -->
            </div>

            <div class="sidebar-footer">
                <div id="status-server" class="status-pill connected">
                    <div class="indicator"></div>
                    Server: Online
                </div>
                <div id="status-qdrant" class="status-pill">
                    <div class="indicator"></div>
                    Qdrant
                </div>
                <div id="status-neo4j" class="status-pill">
                    <div class="indicator"></div>
                    Neo4j
                </div>
            </div>
        </div>

        <!-- Chat Workspace -->
        <div class="chat-area">
            <div id="chat-scroller" class="chat-scroller">
                <!-- Welcome/Landing State -->
                <div id="landing-state" class="landing-container">
                    <h1 class="landing-title">How can LegalMind help you today?</h1>
                    <p class="landing-subtitle">Describe your legal issue or situation in Malayalam or English. We will analyze the facts and verify them against statutory rules.</p>
                </div>
            </div>

            <!-- Input Bar -->
            <div class="input-container">
                <form onsubmit="handleSubmit(event)">
                    <div class="input-bar">
                        <button type="button" id="lang-toggle-btn" onclick="toggleLanguage()" class="lang-toggle-btn" title="Voice Input: Malayalam">മല</button>
                        <button type="button" id="mic-btn" onclick="toggleRecording()" class="mic-btn" title="Record Voice Query">
                            <svg id="mic-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                        </button>
                        <button type="button" id="voice-toggle-btn" onclick="toggleVoiceAutoPlay()" class="voice-toggle-btn" title="Toggle Auto-Play Voice Response (സ്വയം ശബ്ദം കേൾക്കുക)">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                        </button>
                        <input type="text" id="chat-input" class="chat-input" placeholder="Type your message or record voice query..." required autocomplete="off">
                        <button type="submit" id="send-btn" class="send-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transform: rotate(45deg);"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // State variables
        let sessions = [];
        let activeSessionId = null;
        let autoPlayVoice = localStorage.getItem('legalmind_autoplay_voice') === 'true';

        function initVoiceToggleUI() {
            const btn = document.getElementById('voice-toggle-btn');
            if (!btn) return;
            if (autoPlayVoice) {
                btn.classList.add('active');
                btn.title = "Auto-Play Voice: Enabled";
            } else {
                btn.classList.remove('active');
                btn.title = "Auto-Play Voice: Disabled";
            }
        }

        function toggleVoiceAutoPlay() {
            autoPlayVoice = !autoPlayVoice;
            localStorage.setItem('legalmind_autoplay_voice', autoPlayVoice);
            initVoiceToggleUI();
        }

        // Load sessions from localStorage on startup
        function loadSessions() {
            try {
                const data = localStorage.getItem('legalmind_chat_sessions');
                sessions = data ? JSON.parse(data) : [];
            } catch (e) {
                console.error("Failed to load sessions:", e);
                sessions = [];
            }
            renderHistoryList();
            if (sessions.length > 0) {
                switchSession(sessions[0].id);
            } else {
                startNewChat();
            }
        }

        // Save sessions to localStorage
        function saveSessions() {
            try {
                localStorage.setItem('legalmind_chat_sessions', JSON.stringify(sessions));
            } catch (e) {
                console.error("Failed to save sessions:", e);
            }
        }

        // Switch to selected session
        function switchSession(sessionId) {
            activeSessionId = sessionId;
            renderHistoryList();
            renderMessages();
        }

        // Create a new session
        function startNewChat() {
            const newSession = {
                id: 'session_' + Date.now(),
                title: 'New Chat',
                messages: []
            };
            sessions.unshift(newSession);
            activeSessionId = newSession.id;
            saveSessions();
            renderHistoryList();
            renderMessages();
            document.getElementById('chat-input').focus();
        }

        // Delete a session
        function deleteSession(sessionId, event) {
            if (event) event.stopPropagation();
            sessions = sessions.filter(s => s.id !== sessionId);
            saveSessions();
            
            if (activeSessionId === sessionId) {
                if (sessions.length > 0) {
                    activeSessionId = sessions[0].id;
                } else {
                    activeSessionId = null;
                    startNewChat();
                    return;
                }
            }
            renderHistoryList();
            renderMessages();
        }

        // Render Sidebar history list
        function renderHistoryList() {
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '';

            sessions.forEach(session => {
                const item = document.createElement('div');
                item.className = `history-item ${session.id === activeSessionId ? 'active' : ''}`;
                item.onclick = () => switchSession(session.id);

                const titleSpan = document.createElement('span');
                titleSpan.className = 'history-title-text';
                titleSpan.textContent = session.title;

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-history-btn';
                deleteBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>';
                deleteBtn.onclick = (e) => deleteSession(session.id, e);

        // Media recorder variables for voice input
        let mediaRecorder = null;
        let audioChunks = [];
        let recognition = null;
        let selectedLang = 'ml-IN'; // Default voice input language: Malayalam

        function toggleLanguage() {
            const btn = document.getElementById('lang-toggle-btn');
            if (!btn) return;
            if (selectedLang === 'ml-IN') {
                selectedLang = 'en-IN';
                btn.innerText = 'EN';
                btn.title = "Voice Input: English";
            } else {
                selectedLang = 'ml-IN';
                btn.innerText = 'മല';
                btn.title = "Voice Input: Malayalam";
            }
        }

        async function toggleRecording() {
            const micBtn = document.getElementById('mic-btn');
            const chatInput = document.getElementById('chat-input');
            
            // Check for browser SpeechRecognition support
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (SpeechRecognition) {
                // Browser Native Speech Recognition Flow
                if (recognition) {
                    recognition.stop();
                    return;
                }
                
                try {
                    recognition = new SpeechRecognition();
                    recognition.continuous = false;
                    recognition.interimResults = false;
                    recognition.lang = selectedLang;
                    
                    recognition.onstart = () => {
                        micBtn.classList.add('recording');
                        chatInput.placeholder = `Listening (${selectedLang === 'ml-IN' ? 'Malayalam' : 'English'})... Speak now.`;
                        chatInput.value = '';
                    };
                    
                    recognition.onresult = event => {
                        const transcript = event.results[0][0].transcript;
                        chatInput.value = transcript;
                    };
                    
                    recognition.onerror = event => {
                        console.error("Speech recognition error:", event.error);
                        if (event.error !== 'no-speech') {
                            chatInput.placeholder = `Error: ${event.error}. Try typing.`;
                        }
                    };
                    
                    recognition.onend = () => {
                        micBtn.classList.remove('recording');
                        chatInput.placeholder = "Type your message or record voice query...";
                        recognition = null;
                        
                        // Submit automatically if we captured text
                        if (chatInput.value.trim()) {
                            handleSubmit(new Event('submit'));
                        }
                    };
                    
                    recognition.start();
                } catch (err) {
                    console.error("Speech recognition startup failed:", err);
                    fallbackMediaRecorderFlow(micBtn, chatInput);
                }
            } else {
                // Fallback to media recorder upload flow
                fallbackMediaRecorderFlow(micBtn, chatInput);
            }
        }

        async function fallbackMediaRecorderFlow(micBtn, chatInput) {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new AudioContext({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(stream);
                const processor = audioContext.createScriptProcessor(4096, 1, 1);
                
                audioChunks = [];
                processor.onaudioprocess = function(e) {
                    const channelData = e.inputBuffer.getChannelData(0);
                    audioChunks.push(new Float32Array(channelData));
                };
                
                source.connect(processor);
                processor.connect(audioContext.destination);
                
                mediaRecorder = { state: "recording" };
                micBtn.classList.add('recording');
                chatInput.placeholder = "Recording (Fallback)... Click mic again to stop.";
                
                mediaRecorder.stop = async () => {
                    mediaRecorder.state = "inactive";
                    micBtn.classList.remove('recording');
                    chatInput.placeholder = "Transcribing voice...";
                    
                    processor.disconnect();
                    source.disconnect();
                    stream.getTracks().forEach(track => track.stop());
                    
                    let length = 0;
                    audioChunks.forEach(chunk => length += chunk.length);
                    const flattened = new Float32Array(length);
                    let offset = 0;
                    audioChunks.forEach(chunk => {
                        flattened.set(chunk, offset);
                        offset += chunk.length;
                    });
                    
                    const buffer = new ArrayBuffer(44 + flattened.length * 2);
                    const view = new DataView(buffer);
                    
                    const writeString = (v, o, s) => { for(let i=0; i<s.length; i++) v.setUint8(o+i, s.charCodeAt(i)); };
                    
                    writeString(view, 0, 'RIFF');
                    view.setUint32(4, 36 + flattened.length * 2, true);
                    writeString(view, 8, 'WAVE');
                    writeString(view, 12, 'fmt ');
                    view.setUint32(16, 16, true);
                    view.setUint16(20, 1, true);
                    view.setUint16(22, 1, true);
                    view.setUint32(24, 16000, true);
                    view.setUint32(28, 16000 * 2, true);
                    view.setUint16(32, 2, true);
                    view.setUint16(34, 16, true);
                    writeString(view, 36, 'data');
                    view.setUint32(40, flattened.length * 2, true);
                    
                    let pcmOffset = 44;
                    for (let i = 0; i < flattened.length; i++) {
                        let s = Math.max(-1, Math.min(1, flattened[i]));
                        view.setInt16(pcmOffset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                        pcmOffset += 2;
                    }
                    
                    const audioBlob = new Blob([view], { type: 'audio/wav' });
                    const formData = new FormData();
                    formData.append("file", audioBlob, "query_audio.wav");
                    
                    try {
                        const response = await fetch("/api/voice/transcribe-file", {
                            method: "POST",
                            body: formData
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            if (data.transcript) {
                                chatInput.value = data.transcript;
                                chatInput.placeholder = "Type your message or record voice query...";
                                handleSubmit(new Event('submit'));
                            } else {
                                chatInput.placeholder = "No transcription returned. Try again.";
                            }
                        } else {
                            chatInput.placeholder = "Transcription failed. Try again.";
                        }
                    } catch (e) {
                        console.error("STT error:", e);
                        chatInput.placeholder = "Error transcribing. Try again.";
                    }
                };
            } catch (err) {
                console.error("Failed to access microphone:", err);
                alert("Please check microphone permissions and try again.");
            }
        }

        // Voice output synthesis player
        let currentAudio = null;
        function speakText(text, btn) {
            if (currentAudio) {
                const wasPlayingThis = currentAudio.src.includes(encodeURIComponent(text.replace(/[*#]/g, '').trim()));
                currentAudio.pause();
                currentAudio = null;
                // Reset other button labels
                document.querySelectorAll('.layperson-advice-panel button').forEach(b => {
                    b.innerText = b.innerText.replace("⏹ Stop", "🔊 Play");
                });
                if (wasPlayingThis) return;
            }
            
            // Clean up text format slightly for cleaner reading
            const cleanedText = text.replace(/[*#]/g, '').trim();
            if (!cleanedText) return;
            
            const isML = btn.innerText.includes("Malayalam");
            btn.innerText = "⏳ Loading...";
            const speakUrl = `/api/voice/speak?text=${encodeURIComponent(cleanedText)}`;
            
            currentAudio = new Audio(speakUrl);
            currentAudio.onplay = () => {
                btn.innerText = "⏹ Stop " + (isML ? "Malayalam" : "English");
            };
            currentAudio.onended = () => {
                btn.innerText = "🔊 Play " + (isML ? "Malayalam" : "English");
                currentAudio = null;
            };
            currentAudio.onerror = () => {
                btn.innerText = "🔊 Play " + (isML ? "Malayalam" : "English");
                alert("Speech synthesis failed or model timed out.");
                currentAudio = null;
            };
            currentAudio.play();
        }

        // Send query to API
        async function handleSubmit(event) {
            event.preventDefault();
            const inputEl = document.getElementById('chat-input');
            const query = inputEl.value.trim();
            if (!query) return;

            const session = sessions.find(s => s.id === activeSessionId);
            if (!session) return;

            // 1. Add User Message
            session.messages.push({
                role: 'user',
                text: query
            });

            // Update session title if it is the first query
            if (session.title === 'New Chat') {
                session.title = query.length > 25 ? query.substring(0, 25) + '...' : query;
            }

            inputEl.value = '';
            saveSessions();
            renderHistoryList();
            renderMessages();

            // 2. Show Typing Indicator
            const chatScroller = document.getElementById('chat-scroller');
            const typingIndicatorRow = document.createElement('div');
            typingIndicatorRow.className = 'message-row assistant';
            typingIndicatorRow.id = 'typing-indicator-row';
            typingIndicatorRow.innerHTML = `
                <div class="message-bubble" style="padding: 12px 18px; border-radius: 12px; display: inline-flex; align-items: center;">
                    <div class="typing-indicator">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            `;
            chatScroller.appendChild(typingIndicatorRow);
            chatScroller.scrollTop = chatScroller.scrollHeight;

            // Disable send button
            document.getElementById('send-btn').disabled = true;

            try {
                // Compile conversation history to send to server
                const history = session.messages.slice(0, session.messages.length - 1).map(m => ({
                    role: m.role,
                    text: m.role === 'user' ? m.text : (m.data ? m.data.response_text : m.text)
                }));

                // Make API request with standard baseline threshold (0.72)
                const response = await fetch('/api/legal/query', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        query: query, 
                        history: history,
                        threshold: 0.72 
                    })
                });

                const data = await response.json();
                
                // Remove Typing Indicator
                const indicator = document.getElementById('typing-indicator-row');
                if (indicator) indicator.remove();

                if (response.ok) {
                    // 3. Add Assistant Message
                    session.messages.push({
                        role: 'assistant',
                        userQuery: query,
                        data: data
                    });
                    saveSessions();
                    renderMessages();

                    // Auto-Play Voice if active
                    if (autoPlayVoice) {
                        setTimeout(() => {
                            const chatScroller = document.getElementById('chat-scroller');
                            const lastRow = chatScroller.querySelector('.message-row.assistant:last-child');
                            if (lastRow) {
                                const buttons = lastRow.querySelectorAll('.layperson-advice-panel button');
                                if (buttons.length >= 2) {
                                    const isML = /[\u0D00-\u0D7F]/.test(query);
                                    if (isML) {
                                        buttons[0].click(); // Trigger play Malayalam
                                    } else {
                                        buttons[1].click(); // Trigger play English
                                    }
                                }
                            }
                        }, 200);
                    }
                } else {
                    session.messages.push({
                        role: 'assistant',
                        userQuery: query,
                        data: {
                            status: 'UNVERIFIED_LEGAL_GROUNDS',
                            response_text: `Error evaluating inquiry: ${data.detail || "Server error"}`,
                            faithfulness_score: 0.0
                        }
                    });
                    saveSessions();
                    renderMessages();
                }
            } catch (e) {
                const indicator = document.getElementById('typing-indicator-row');
                if (indicator) indicator.remove();
                
                session.messages.push({
                    role: 'assistant',
                    userQuery: query,
                    data: {
                        status: 'UNVERIFIED_LEGAL_GROUNDS',
                        response_text: `Communication failed: ${e.message}`,
                        faithfulness_score: 0.0
                    }
                });
                saveSessions();
                renderMessages();
            } finally {
                document.getElementById('send-btn').disabled = false;
            }
        }

        // Database Health Check
        async function checkHealth() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                
                const qdrantPill = document.getElementById('status-qdrant');
                if (data.qdrant === 'connected') {
                    qdrantPill.className = 'status-pill connected';
                    qdrantPill.innerHTML = '<div class="indicator"></div> Qdrant: Connected';
                } else {
                    qdrantPill.className = 'status-pill disconnected';
                    qdrantPill.innerHTML = '<div class="indicator"></div> Qdrant: Disconnected';
                }

                const neoPill = document.getElementById('status-neo4j');
                if (data.neo4j === 'connected') {
                    neoPill.className = 'status-pill connected';
                    neoPill.innerHTML = '<div class="indicator"></div> Neo4j: Connected';
                } else {
                    neoPill.className = 'status-pill disconnected';
                    neoPill.innerHTML = '<div class="indicator"></div> Neo4j: Disconnected';
                }
            } catch (e) {
                console.error("Health check request failed:", e);
            }
        }
        setInterval(checkHealth, 5000);
        checkHealth();

        // Bootstrapping
        window.onload = () => {
            loadSessions();
            initVoiceToggleUI();
        };
    </script>
</body>
